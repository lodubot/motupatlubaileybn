<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOTU PATLU BUG BOT V8</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 🔥 Animated Background Gradient 🔥 */
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 🔥 Motu Patlu Watermark Animation 🔥 */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 55px;
            font-weight: 900;
            color: rgba(255, 51, 0, 0.08); /* Transparent Red */
            text-align: center;
            white-space: nowrap;
            z-index: 0;
            pointer-events: none;
            animation: pulseText 2.5s infinite alternate;
        }

        @keyframes pulseText {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.05; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.15; text-shadow: 0 0 25px red; }
        }

        /* Upar ki layers ko z-index 1 diya taaki watermark piche rahe */
        .header {
            text-align: center;
            margin-bottom: 20px;
            z-index: 1;
        }
        .header h1 {
            color: #ff3300;
            text-shadow: 0 0 10px #ff3300, 0 0 20px #ff7700;
            margin: 0;
            font-size: 28px;
        }
        .header p {
            color: #aaaaaa;
            margin-top: 5px;
            font-size: 14px;
        }
        
        .pair-section {
            width: 90%;
            max-width: 400px;
            background: rgba(26, 26, 26, 0.6); /* Glassmorphism effect */
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 51, 0, 0.4);
            margin-bottom: 20px;
            text-align: center;
            z-index: 1;
        }
        .input-box {
            width: 85%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ff3300;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        .input-box:focus {
            box-shadow: 0 0 15px #ff3300;
        }
        .input-box::placeholder {
            color: #777;
        }

        .menu-container {
            width: 90%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 15px;
            z-index: 1;
        }
        
        .btn {
            background: linear-gradient(45deg, #ff0000, #ff7300);
            color: white;
            border: none;
            padding: 15px 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
            transition: transform 0.1s;
            animation: fireGlow 1.5s infinite alternate; 
        }
        .btn:active {
            transform: scale(0.95); 
        }
        .btn-full {
            grid-column: span 2; 
        }
        .btn-pair {
            background: linear-gradient(45deg, #00ccff, #0055ff);
            box-shadow: 0 4px 15px rgba(0, 85, 255, 0.4);
            animation: none; 
        }
        .btn-close {
            background: linear-gradient(45deg, #333333, #555555);
            animation: none;
            box-shadow: none;
        }

        @keyframes fireGlow {
            0% { box-shadow: 0 0 5px #ff0000; }
            100% { box-shadow: 0 0 20px #ff7300, 0 0 30px #ff0000; }
        }
    </style>
</head>
<body>

    <div class="watermark">MOTU PATLU<br>BUG BOT V8</div>

    <div class="header">
        <h1>🔥 MOTU PATLU V8 🔥</h1>
        <p>Rajput Team 101</p>
    </div>

    <div class="pair-section">
        <input type="number" id="phoneNumber" class="input-box" placeholder="Enter Number (e.g., 91...)" />
        <button class="btn btn-full btn-pair" style="width: 100%;" onclick="requestPair()">🔗 Get Pair Code</button>
    </div>

    <div class="menu-container">
        <button class="btn" onclick="sendToBot('/menu')">📁 Main Menu</button>
        <button class="btn" onclick="sendToBot('/sys')">⚙️ System Info</button>
        <button class="btn btn-full" onclick="sendToBot('/owner')">👑 Owner Menu</button>
        <button class="btn btn-full" onclick="sendToBot('/buy')">💎 Buy Premium</button>
        
        <button class="btn btn-full btn-close" onclick="closeApp()">❌ Close Menu</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 🔥 URL parameters read karna taaki pata chale System Locked hai ya nahi
        const urlParams = new URLSearchParams(window.location.search);
        const isLocked = urlParams.get('locked') === 'true';
        const isPrem = urlParams.get('prem') === 'true';

        function requestPair() {
            // Agar Bot lock mode me hai aur user Premium nahi hai
            if (isLocked && !isPrem) {
                tg.showAlert("🚫 ACCESS DENIED!\n\nFree Mode is OFF. You must have an active Premium Subscription to use this feature.\n\n📩 DM to buy Premium: @RAJPUTTEAM101");
                return; 
            }

            let phone = document.getElementById('phoneNumber').value;
            
            if (!phone) {
                tg.showAlert("⚠️ Please enter a WhatsApp number first!");
                return;
            }
            
            tg.sendData("/pair " + phone);
            tg.close(); 
        }

        function sendToBot(action) {
            tg.sendData(action);
            tg.close();
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
